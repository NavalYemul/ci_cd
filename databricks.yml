# This is a Databricks asset bundle definition for acc_cicd.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: acc_cicd
  uuid: 86dc81ba-3a66-47c2-a380-7aa2cebc2965

variables:
  catalog:
    description: "Catalog per environment"

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-731162118893884.4.azuredatabricks.net
    variables:
      catalog: develop

  uat:
    mode: production
    workspace:
      host: https://adb-731162118893884.4.azuredatabricks.net
    variables:
      catalog: uat

  prod:
    mode: production
    workspace:
      host: https://adb-731162118893884.4.azuredatabricks.net
    variables:
      catalog: prod
      # We explicitly deploy to /Workspace/Users/navallyemul@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/navallyemul@gmail.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: navallyemul@gmail.com
        level: CAN_MANAGE
