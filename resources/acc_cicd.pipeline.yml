# The main pipeline for acc_cicd
resources:
  pipelines:
    acc_cicd_pipeline:
      name: acc_cicd_pipeline
      ## Catalog is required for serverless compute
      catalog: develop
      schema: acc_cicd_${bundle.target}
      serverless: true
      libraries:
        - notebook:
            path: ../src/pipeline.ipynb

      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
